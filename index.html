<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interior Design Studio | Premium Hero</title>

    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600&family=Montserrat:wght@300;400;500&display=swap"
        rel="stylesheet">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/magnific-popup.js/1.1.0/magnific-popup.min.css">

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
    <link rel="stylesheet" href="style.css">

</head>

<body>

    <nav class="navbar navbar-expand-lg fixed-top" id="mainNav">
        <div class="container">
            <a class="navbar-brand" href="#">Logo</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="#">Home</a></li>
                    <li class="nav-item"><a class="nav-link" href="#">About us</a></li>
                    <li class="nav-item"><a class="nav-link" href="#">Floor Plan</a></li>
                    <li class="nav-item"><a class="nav-link" href="#">Price</a></li>
                    <li class="nav-item"><a class="nav-link" href="#">Amenities</a></li>
                    <li class="nav-item"><a class="nav-link" href="#">Highlights</a></li>
                    <li class="nav-item"><a class="nav-link" href="#">Location</a></li>
                    <li class="nav-item"><a class="nav-link" href="#">Gallery</a></li>
                    <li class="nav-item"><a class="nav-link" href="#">Contact
                        </a></li>

                        

                </ul>
                
            </div>
        </div>
    </nav>
    <!-- hero section  -->
    <section class="banner-sectionn">
        <div class="swiper mySwiperbann">
            <div class="swiper-wrapper">
                <div class="swiper-slide">
                    <div class="slide-bg"
                        style="background-image:linear-gradient(rgba(10, 25, 47, 0.6), rgba(10, 25, 47, 0.6)), url('https://i.pinimg.com/1200x/26/21/53/26215335d6351d52ab67315c3a9838b4.jpg');">
                    </div>
                    <div class="overlay"></div>
                </div>
                <div class="swiper-slide">
                    <div class="slide-bg"
                        style="background-image:linear-gradient(rgba(10, 25, 47, 0.6), rgba(10, 25, 47, 0.6)), url('https://i.pinimg.com/1200x/c9/88/17/c988176f91ba1140677cca1455663de6.jpg');">
                    </div>
                    <div class="overlay"></div>
                </div>
                <div class="swiper-slide">
                    <div class="slide-bg"
                        style="background-image:linear-gradient(rgba(10, 25, 47, 0.6), rgba(10, 25, 47, 0.6)), url('https://i.pinimg.com/1200x/88/0f/dd/880fdd22dc7174fcfbcab7b15460d712.jpg');">
                    </div>
                    <div class="overlay"></div>
                </div>
            </div>
            <div class="swiper-pagination"></div>
        </div>

        <div class="static-content-overlay">
            <div class="container hero-content">
                <div class="row gy-5 align-items-center ">

                    <div class="col-lg-7" data-aos="fade-right" data-aos-duration="1200">
                        <p class="h3 fw-light mb-4 text-start">WELCOME TO IREO


                        <p class="h3 fw-light mb-4 text-start">The Final Call at IREO The Corridors -

                        </p>
                        <h1 class="display-4 fw-bold mb-2 text-uppercase text-start" style="color: #e68a00">
                            Sector 67A, Gurgaon!</h1>

                        <p class="h3 fw-light mb-4 text-start">2 & 3BHK Homes
                        <p class="h3 fw-light mb-4 text-start">Starting price ₹2.50 Cr* onwards




                        <div class="mt-4 d-flex flex-wrap gap-3 hero-btn">
                            <a href="tel:9112764534"
                                class="btn btn-outline-light btn-lg px-5 py-3 fw-bold rounded-pill">Contact Us</a>
                        </div>
                    </div>

                    <div class="col-lg-5" data-aos="zoom-in" data-aos-delay="300">
                        <div class="form-card">
                            <h3>Message Type Here</h3>
                            <form id="leadForm">
                               <input type="text" class="form-control" placeholder="Enter your name" required>
                            <input type="tel" class="form-control" placeholder="Enter your phone" required>
                            <input type="text" class="form-control" placeholder="Enter your city" required>
                            
                            <div class="form-check mb-3">
                                <input class="form-check-input" type="checkbox" value="" id="flexCheckDefault" checked>
                                <label class="form-check-label" for="flexCheckDefault">
                                    Contact us today, and get reply within 24 hours! Please read it carefully before submitting.
                                </label>
                            </div>
                            
                            <button type="submit" class="btn btn-custommm w-100 py-3">Send Message</button>
                       
                            </form>
                           
                        </div>
                    </div>

                </div>
            </div>
        </div>
    </section>

    <!-- new  -->

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>


    <script>
        AOS.init({
            once: true,
            duration: 1000
        });

        var swiper = new Swiper(".mySwiperbann", {
            loop: true,
            speed: 2000,
            autoplay: {
                delay: 4000,
                disableOnInteraction: false,
            },
            effect: 'fade',
            fadeEffect: {
                crossFade: true
            },
            pagination: {
                el: ".swiper-pagination",
                clickable: true,
            },
        });

        document.getElementById('leadForm').addEventListener('submit', function (e) {
            e.preventDefault();
            alert('Thank you! Our expert will contact you shortly.');
        });
    </script>
    <script>


        const nav = document.getElementById('mainNav');
        window.addEventListener('scroll', () => {
            if (window.scrollY > 80) {
                nav.classList.add('scrolled');
            } else {
                nav.classList.remove('scrolled');
            }
        });
    </script>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/magnific-popup.js/1.1.0/jquery.magnific-popup.min.js"></script>


</body>

</html>
