<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Windsor Majesty Gallery - Interactive</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />

    <style>
        body {
            background-color: #fff;
            font-family: 'Segoe UI', sans-serif;
            padding: 50px 0;
        }

        .gallery-header {
            text-align: center;
            margin-bottom: 50px;
        }

        .gallery-header p {
            color: #d4b07c;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-size: 14px;
            margin-bottom: 5px;
            font-weight: 600;
        }

        .gallery-header h2 {
            font-size: 36px;
            font-weight: 700;
            color: #333;
        }

        /* Swiper Setup */
        .swiper {
            width: 100%;
            padding: 20px 0 80px !important;
        }

        .swiper-slide {
            padding: 0 15px;
        }

        /* Card & Overlay Design */
        .gallery-card {
            position: relative;
            overflow: hidden;
            border-radius: 4px;
            height: 400px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
        }

        .gallery-card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.6s ease;
        }

        /* Dark Overlay */
        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            /* Black transparent overlay */
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: opacity 0.4s ease;
            z-index: 5;
        }

        /* View Button Style */
        .view-btn {
            background-color: #d4b07c;
            color: white;
            border: none;
            padding: 10px 25px;
            font-size: 14px;
            font-weight: 600;
            text-transform: uppercase;
            border-radius: 50px;
            transform: translateY(20px);
            transition: all 0.4s ease;
            cursor: pointer;
            text-decoration: none;
        }

        .view-btn:hover {
            background-color: #bfa37c;
            color: white;
        }

        /* Hover Actions */
        .gallery-card:hover img {
            transform: scale(1.1);
        }

        .gallery-card:hover .overlay {
            opacity: 1;
        }

        .gallery-card:hover .view-btn {
            transform: translateY(0);
        }

        /* Gold Label (Non-Hover) */
        .label-gold {
            position: absolute;
            bottom: 20px;
            left: 0;
            background-color: #d4b07c;
            color: white;
            padding: 8px 18px;
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            z-index: 4;
            /* Below overlay but above img */
        }

        /* Navigation Arrows */
        .swiper-button-next,
        .swiper-button-prev {
            color: #d4b07c;
            background: white;
            width: 45px;
            height: 45px;
            border-radius: 50%;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
        }

        /* Modal Image Styling */
        .modal-content {
            background: transparent;
            border: none;
        }

        .modal-body img {
            border-radius: 8px;
            border: 3px solid #d4b07c;
        }

        @media (max-width: 768px) {
            .gallery-card {
                height: 300px;
            }
        }
    </style>
</head>

<body>

    <div class="container-fluid px-lg-5">
        <div class="gallery-header">
            <p>Gallery</p>
            <h2>Windsor Majesty</h2>
        </div>

        <div class="swiper mySwipergal">
            <div class="swiper-wrapper">
                <div class="swiper-slide">
                    <div class="gallery-card">
                        <img src="https://images.unsplash.com/photo-1545324418-cc1a3fa10c00?q=80&w=1000" id="img1">
                        <div class="label-gold">Artist's Impressions</div>
                        <div class="overlay">
                            <button class="view-btn"
                                onclick="openModal('https://images.unsplash.com/photo-1545324418-cc1a3fa10c00?q=80&w=1000')">View
                                Image</button>
                        </div>
                    </div>
                </div>
                <div class="swiper-slide">
                    <div class="gallery-card">
                        <img src="https://images.unsplash.com/photo-1512918728675-ed5a9ecdebfd?q=80&w=1000">
                        <div class="label-gold">Artist's Impressions</div>
                        <div class="overlay">
                            <button class="view-btn"
                                onclick="openModal('https://images.unsplash.com/photo-1512918728675-ed5a9ecdebfd?q=80&w=1000')">View
                                Image</button>
                        </div>
                    </div>
                </div>
                <div class="swiper-slide">
                    <div class="gallery-card">
                        <img src="https://images.unsplash.com/photo-1486406146926-c627a92ad1ab?q=80&w=1000">
                        <div class="label-gold">Artist's Impressions</div>
                        <div class="overlay">
                            <button class="view-btn"
                                onclick="openModal('https://images.unsplash.com/photo-1486406146926-c627a92ad1ab?q=80&w=1000')">View
                                Image</button>
                        </div>
                    </div>
                </div>
            </div>

            <div class="swiper-pagination"></div>
            <div class="swiper-button-next"></div>
            <div class="swiper-button-prev"></div>
        </div>
    </div>

    <div class="modal fade" id="imageModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered modal-lg">
            <div class="modal-content">
                <div class="modal-body p-0 text-center">
                    <button type="button" class="btn-close btn-close-white position-absolute top-0 end-0 m-3"
                        data-bs-dismiss="modal" aria-label="Close"></button>
                    <img src="" id="modalImage" class="img-fluid w-100">
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>

    <script>
        // Initialize Swiper
        var swiper = new Swiper(".mySwipergal", {
            slidesPerView: 1,
            spaceBetween: 0,
            loop: true,
            autoplay: { delay: 4000 },
            pagination: { el: ".swiper-pagination", clickable: true },
            navigation: { nextEl: ".swiper-button-next", prevEl: ".swiper-button-prev" },
            breakpoints: {
                768: { slidesPerView: 2 },
                1024: { slidesPerView: 3 },
            },
        });

        // Function to handle Image Modal
        function openModal(imgSrc) {
            document.getElementById('modalImage').src = imgSrc;
            var myModal = new bootstrap.Modal(document.getElementById('imageModal'));
            myModal.show();
        }
    </script>

</body>

</html>
